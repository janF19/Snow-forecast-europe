name: Verify Application

on:
  push:
    branches: [main]
    paths-ignore:
      - weather_dataFull_7.json
  pull_request:
    branches: [main]
    paths-ignore:
      - weather_dataFull_7.json

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: npm ci
      - run: npm run build
      - run: npm test
